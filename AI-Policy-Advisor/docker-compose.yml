version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./vector_db:/app/vector_db
    command: uvicorn app:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    ports:
      - "8501:8501"
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./vector_db:/app/vector_db
    command: streamlit run ui/dashboard.py --server.address 0.0.0.0 --server.port 8501
